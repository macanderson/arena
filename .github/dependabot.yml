# Automated dependency + security updates.
# https://docs.github.com/code-security/dependabot
version: 2
updates:
  # JS/TS harness (root package.json, pnpm).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-dev:
        dependency-type: development
        update-types: [minor, patch]

  # Python Harbor adapter.
  - package-ecosystem: pip
    directory: /harbor
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # The GitHub Actions we pin in workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
